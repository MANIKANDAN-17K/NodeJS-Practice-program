<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QUOTUM — Random Quote Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Courier+Prime:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --bg2: #ece6d9;
      --ink: #1a1814;
      --ink2: #5a5550;
      --ink3: #9a9590;
      --accent: #c0392b;
      --accent2: #e74c3c;
      --border: #d5cfc4;
      --shadow: rgba(26,24,20,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 1;
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .logo {
      font-family: 'Courier Prime', monospace;
      font-size: 1.1rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--ink2);
    }
    .logo strong { color: var(--accent); }
    .header-sub {
      font-size: 0.78rem; color: var(--ink3);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ── QUOTE CARD ── */
    .quote-card {
      width: 100%; max-width: 680px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3.5rem 4rem;
      box-shadow: 0 2px 4px var(--shadow), 0 12px 40px var(--shadow);
      position: relative;
      transition: opacity 0.4s, transform 0.4s;
    }
    .quote-card.fading {
      opacity: 0;
      transform: translateY(8px);
    }

    /* Big decorative quote mark */
    .quote-mark {
      font-family: 'Lora', serif;
      font-size: 8rem; line-height: 0.7;
      color: var(--accent);
      opacity: 0.15;
      position: absolute;
      top: 2rem; left: 3rem;
      user-select: none; pointer-events: none;
    }

    .quote-tags {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; min-height: 22px;
    }
    .tag {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent);
      border: 1px solid rgba(192,57,43,0.3);
      padding: 2px 8px; border-radius: 2px;
    }

    .quote-text {
      font-family: 'Lora', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.55rem);
      line-height: 1.7;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 2rem;
      position: relative; z-index: 1;
    }

    .quote-author {
      font-family: 'Courier Prime', monospace;
      font-size: 0.9rem;
      color: var(--ink2);
      display: flex; align-items: center; gap: 0.75rem;
    }
    .quote-author::before {
      content: '';
      display: block; width: 28px; height: 1px;
      background: var(--accent); flex-shrink: 0;
    }

    /* Loading state */
    .quote-text.loading, .quote-author.loading {
      color: transparent;
      background: linear-gradient(90deg, var(--bg2) 25%, var(--border) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    .quote-author.loading::before { display: none; }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex; align-items: center; gap: 1rem;
      margin-top: 2.5rem; flex-wrap: wrap;
    }
    .btn-new {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--accent);
      color: #fff; border: none;
      font-family: 'Courier Prime', monospace;
      font-size: 0.95rem; letter-spacing: 0.05em;
      padding: 0.75rem 1.8rem;
      border-radius: 2px; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-new:hover { background: var(--accent2); }
    .btn-new:active { transform: scale(0.97); }
    .btn-new svg { width: 16px; height: 16px; transition: transform 0.4s; }
    .btn-new:hover svg { transform: rotate(180deg); }

    .btn-icon {
      width: 40px; height: 40px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--ink2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .btn-icon:hover { border-color: var(--ink2); color: var(--ink); }
    .btn-icon.fav-active { border-color: var(--accent); color: var(--accent); }

    .source-badge {
      margin-left: auto;
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem; color: var(--ink3);
      letter-spacing: 0.08em;
    }

    /* ── FAVOURITES DRAWER ── */
    .fav-section {
      width: 100%; max-width: 680px;
      margin-top: 2rem;
    }
    .fav-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .fav-title {
      font-family: 'Courier Prime', monospace;
      font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--ink3);
    }
    .fav-clear {
      background: none; border: none;
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem; color: var(--ink3);
      cursor: pointer; text-decoration: underline;
      transition: color 0.2s;
    }
    .fav-clear:hover { color: var(--accent); }

    .fav-list {
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .fav-item {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 2px;
      padding: 1rem 1.2rem;
      display: flex; align-items: flex-start; gap: 1rem;
      animation: slideIn 0.3s both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .fav-item-text {
      flex: 1;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.9rem; line-height: 1.6; color: var(--ink);
    }
    .fav-item-author {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem; color: var(--ink3);
      margin-top: 0.3rem; font-style: normal;
    }
    .fav-remove {
      background: none; border: none;
      color: var(--ink3); cursor: pointer;
      font-size: 1rem; line-height: 1;
      transition: color 0.2s; flex-shrink: 0;
      padding: 0;
    }
    .fav-remove:hover { color: var(--accent); }

    .fav-empty {
      font-family: 'Courier Prime', monospace;
      font-size: 0.82rem; color: var(--ink3);
      text-align: center; padding: 1.5rem;
      border: 1px dashed var(--border); border-radius: 2px;
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem; color: var(--ink3);
      letter-spacing: 0.06em;
    }

    /* ── TOAST ── */
    .toast-wrap {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 999; pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--bg);
      font-family: 'Courier Prime', monospace;
      font-size: 0.82rem; letter-spacing: 0.05em;
      padding: 0.55rem 1.3rem;
      border-radius: 2px;
      animation: toastIn 0.3s both;
      white-space: nowrap;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .quote-card { padding: 2.5rem 2rem; }
      .quote-mark { font-size: 6rem; left: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><strong>QUO</strong>TUM</div>
  <div class="header-sub">Random Quote Machine</div>
</header>

<main>
  <!-- QUOTE CARD -->
  <div class="quote-card" id="quoteCard">
    <div class="quote-mark">"</div>
    <div class="quote-tags" id="quoteTags"></div>
    <div class="quote-text" id="quoteText">Loading a great quote for you...</div>
    <div class="quote-author" id="quoteAuthor">—</div>
  </div>

  <!-- ACTIONS -->
  <div class="actions" style="width:100%;max-width:680px">
    <button class="btn-new" id="newQuoteBtn" onclick="fetchQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
      </svg>
      New Quote
    </button>
    <button class="btn-icon" id="favBtn" title="Save to favourites" onclick="toggleFavourite()">♡</button>
    <button class="btn-icon" title="Copy quote" onclick="copyQuote()">⎘</button>
    <span class="source-badge" id="sourceBadge"></span>
  </div>

  <!-- FAVOURITES -->
  <div class="fav-section" id="favSection" style="display:none">
    <div class="fav-header">
      <span class="fav-title">Saved Quotes</span>
      <button class="fav-clear" onclick="clearFavourites()">Clear all</button>
    </div>
    <div class="fav-list" id="favList"></div>
  </div>
</main>

<footer>
  Quotes sourced from quotable.io · Built with Express + Vanilla JS
</footer>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  // ── STATE ──
  let currentQuote = null;
  let favourites = JSON.parse(localStorage.getItem('quotum-favs') || '[]');

  // ── UTILS ──
  function showToast(msg) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    wrap.innerHTML = '';
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  function setLoading(on) {
    const text = document.getElementById('quoteText');
    const author = document.getElementById('quoteAuthor');
    if (on) {
      text.classList.add('loading');
      text.textContent = 'Fetching a great thought...';
      author.classList.add('loading');
      author.textContent = '—————————';
      document.getElementById('quoteTags').innerHTML = '';
    } else {
      text.classList.remove('loading');
      author.classList.remove('loading');
    }
  }

  // ── FETCH QUOTE FROM OUR BACKEND ──
  async function fetchQuote() {
    const card = document.getElementById('quoteCard');
    const btn = document.getElementById('newQuoteBtn');
    btn.disabled = true;

    // Step 1: fade out
    card.classList.add('fading');
    await new Promise(r => setTimeout(r, 350));
    card.classList.remove('fading');
    setLoading(true);

    try {
      // Step 2: call our Express server (NOT quotable.io directly)
      const res = await fetch('/api/quote');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();

      // Step 3: update DOM
      currentQuote = json.data;
      document.getElementById('quoteText').textContent = `"${currentQuote.quote}"`;
      document.getElementById('quoteAuthor').textContent = currentQuote.author;

      const tagsEl = document.getElementById('quoteTags');
      tagsEl.innerHTML = (currentQuote.tags || []).slice(0, 3).map(t =>
        `<span class="tag">${t}</span>`
      ).join('');

      document.getElementById('sourceBadge').textContent =
        json.source === 'fallback' ? '· local fallback' : '· dummyjson.com';

      setLoading(false);
      updateFavBtn();

    } catch (err) {
      // Only hits here if Express server itself is offline
      document.getElementById('quoteText').textContent = '"Make sure your Express server is running."';
      document.getElementById('quoteAuthor').textContent = 'run: npm run dev';
      document.getElementById('sourceBadge').textContent = '· server offline';
      setLoading(false);
    }

    // Step 4: fade back in
    card.classList.add('fading');
    await new Promise(r => setTimeout(r, 30));
    card.classList.remove('fading');
    btn.disabled = false;
  }

  // ── FAVOURITES ──
  function saveFavourites() {
    localStorage.setItem('quotum-favs', JSON.stringify(favourites));
  }

  function isFavourited() {
    if (!currentQuote) return false;
    return favourites.some(f => f.quote === currentQuote.quote);
  }

  function updateFavBtn() {
    const btn = document.getElementById('favBtn');
    if (isFavourited()) {
      btn.textContent = '♥';
      btn.classList.add('fav-active');
    } else {
      btn.textContent = '♡';
      btn.classList.remove('fav-active');
    }
  }

  function toggleFavourite() {
    if (!currentQuote) return;
    if (isFavourited()) {
      favourites = favourites.filter(f => f.quote !== currentQuote.quote);
      showToast('Removed from saved quotes');
    } else {
      favourites.unshift({ ...currentQuote });
      showToast('Saved! ♥');
    }
    saveFavourites();
    updateFavBtn();
    renderFavourites();
  }

  function renderFavourites() {
    const section = document.getElementById('favSection');
    const list = document.getElementById('favList');

    if (!favourites.length) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    list.innerHTML = favourites.map((f, i) => `
      <div class="fav-item">
        <div>
          <div class="fav-item-text">"${f.quote}"</div>
          <div class="fav-item-author">— ${f.author}</div>
        </div>
        <button class="fav-remove" onclick="removeFav(${i})" title="Remove">✕</button>
      </div>
    `).join('');
  }

  function removeFav(i) {
    favourites.splice(i, 1);
    saveFavourites();
    renderFavourites();
    updateFavBtn();
  }

  function clearFavourites() {
    favourites = [];
    saveFavourites();
    renderFavourites();
    updateFavBtn();
    showToast('Cleared all saved quotes');
  }

  // ── COPY ──
  async function copyQuote() {
    if (!currentQuote) return;
    const text = `"${currentQuote.quote}" — ${currentQuote.author}`;
    try {
      await navigator.clipboard.writeText(text);
      showToast('Copied to clipboard!');
    } catch {
      showToast('Could not copy');
    }
  }

  // ── KEYBOARD SHORTCUT ──
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      fetchQuote();
    }
  });

  // ── INIT ──
  renderFavourites();
  fetchQuote();
</script>
</body>
</html>
